<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>URI Dispatch Demo</title>
  <style>
    body { background: #f4f6f8; color: #17212b; font-family: system-ui, sans-serif; margin: 0; }
    main { display: grid; gap: 1rem; margin: 0 auto; max-width: 960px; padding: 1.5rem; }
    section { background: #fff; border: 1px solid #d8e0e8; border-radius: 8px; padding: 1rem; }
    button, .button { background: #fff; border: 1px solid #9eacba; border-radius: 6px; color: inherit; cursor: pointer; display: inline-flex; font: inherit; margin: 0.2rem; padding: 0.7rem 0.9rem; text-decoration: none; }
    button[aria-busy="true"], .button[aria-busy="true"] { opacity: 0.6; }
    pre { background: #101820; border-radius: 6px; color: #dce8ef; margin: 0; max-height: 18rem; overflow: auto; padding: 1rem; }
    .facts { display: grid; gap: 0.5rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .label { color: #657384; font-size: 0.8rem; font-weight: 700; letter-spacing: 0; text-transform: uppercase; }
  </style>
</head>
<body>
  <main>
    <section>
      <p class="label">Controls</p>
      <a id="led-on" class="button" href="#">LED on</a>
      <a id="led-off" class="button" href="#">LED off</a>
      <button id="ping-device" type="button">Ping device</button>
      <button id="run-process" type="button">Run process</button>
      <button id="write-log" type="button">Write log</button>
    </section>
    <section>
      <p class="label">State</p>
      <div class="facts">
        <div>LED: <strong id="led">-</strong></div>
        <div>Last: <strong id="last-command">-</strong></div>
        <div>Uptime: <strong id="uptime">-</strong></div>
      </div>
    </section>
    <section>
      <p id="logs-label" class="label">Backend logs</p>
      <pre id="logs">[]</pre>
    </section>
    <section>
      <p class="label">Last dispatch</p>
      <pre id="last">{}</pre>
    </section>
  </main>
  <script id="uridemo-config" type="application/json">__URIDEMO_CONFIG__</script>
  <script type="module">
    const $ = (selector) => document.querySelector(selector);
    const config = Object.freeze(JSON.parse($('#uridemo-config').textContent));
    const endpoint = config.URIDEMO_API_PATH;
    const logLimit = Number.parseInt(config.URIDEMO_LOG_LIMIT, 10);
    const refreshMs = Number.parseInt(config.URIDEMO_REFRESH_MS, 10);
    const { createUriActions, dispatchUri } = await import(config.URIDEMO_JS_MODULE_PATH);

    function bindAction(selector, uri, payload, { href = false } = {}) {
      const element = $(selector);
      if (href) {
        element.setAttribute('href', `#${uri}`);
      } else {
        element.setAttribute('data-uri', uri);
      }
      element.setAttribute('data-payload', JSON.stringify(payload));
    }

    bindAction('#led-on', config.URI_DEVICE_LED_SET, { on: true }, { href: true });
    bindAction('#led-off', config.URI_DEVICE_LED_SET, { on: false }, { href: true });
    bindAction('#ping-device', config.URI_DEVICE_PING_SEND, { source: 'frontend' });
    bindAction('#run-process', config.URI_PROCESS_SMOKE, { source: 'frontend' });
    bindAction('#write-log', config.URI_LOG_FRONTEND_ACTION_WRITE, {
      action: 'manual-log',
      detail: { from: 'button' },
    });
    $('#logs-label').textContent = `Backend logs via ${config.URI_LOG_BACKEND_LOGS_RECENT}`;

    function callUri(uri, options = {}) {
      return dispatchUri(uri, { endpoint, ...options });
    }

    async function refresh() {
      const state = await callUri(config.URI_DEVICE_STATE_CURRENT);
      $('#led').textContent = state.state.led ? 'on' : 'off';
      $('#last-command').textContent = state.state.last_command || '-';
      $('#uptime').textContent = `${state.state.uptime_ms}ms`;
      const logs = await callUri(config.URI_LOG_BACKEND_LOGS_RECENT, { payload: { limit: logLimit } });
      $('#logs').textContent = JSON.stringify(logs.logs, null, 2);
    }

    createUriActions({ endpoint });

    document.addEventListener('uri:success', async (event) => {
      $('#last').textContent = JSON.stringify(event.detail.response, null, 2);
      await callUri(config.URI_LOG_FRONTEND_ACTION_WRITE, {
        payload: {
          action: 'uri.click',
          detail: { uri: event.detail.uri },
        },
      });
      await refresh();
    });
    document.addEventListener('uri:error', (event) => {
      $('#last').textContent = String(event.detail.error);
    });

    await callUri(config.URI_LOG_FRONTEND_SESSION_WRITE, {
      payload: { event: 'frontend.started', detail: { href: location.href } },
    });
    await refresh();
    setInterval(refresh, refreshMs);
  </script>
</body>
</html>
