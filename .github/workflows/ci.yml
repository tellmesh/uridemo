name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install -e python pytest
      - run: pytest python/tests -q
      - run: node --test js/*.test.js
      - run: |
          python examples/python-server.py &
          pid=$!
          trap "kill $pid" EXIT
          python examples/smoke.py
